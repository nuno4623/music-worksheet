<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6학년 음악 블루마블 · 1학기 총정리 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c1: #e5484d; /* 장단·민요 */
    --c2: #f76b15; /* 기보·악기 */
    --c3: #30a46c; /* 가락·화음 */
    --c4: #3e7bfa; /* 리듬·창작 */
    --c5: #8e4ec6; /* 합창·합주 */
    --c6: #06a5b3; /* 감상·생활 */
    --gold: #f5c945;
    --ink: #1f1a2e;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    color: #fff;
    background: radial-gradient(ellipse 1100px 700px at 50% 0%, #3a2b63 0%, #241a44 55%, #140d28 100%);
    padding: 24px 14px 60px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .wrap { width: 100%; max-width: 1120px; }

  h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(26px, 5vw, 46px);
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.15;
    background: linear-gradient(90deg, #ffd76b, #ff9a5b, #ff6fb0);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.35));
  }
  .subtitle {
    text-align: center;
    font-weight: 500;
    color: #c7bdec;
    margin-top: 6px;
    font-size: clamp(13px, 2.4vw, 16px);
  }

  /* ============ 설정 화면 ============ */
  .card {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 22px;
    padding: 26px 22px;
    margin-top: 22px;
    backdrop-filter: blur(6px);
    box-shadow: 0 18px 50px rgba(0,0,0,.35);
  }
  .setup h2 {
    font-family: 'Jua', sans-serif;
    font-size: 20px;
    margin-bottom: 14px;
    color: #ffe08a;
  }
  .field { margin-bottom: 20px; }
  .field > label { display:block; font-weight:700; margin-bottom:10px; color:#e6deff; }
  .chips { display:flex; flex-wrap:wrap; gap:10px; }
  .chip {
    border: 2px solid rgba(255,255,255,.2);
    background: rgba(255,255,255,.05);
    color:#fff; padding:10px 18px; border-radius:999px;
    font-size:16px; font-weight:700; cursor:pointer; transition:.15s;
    font-family:'Jua',sans-serif;
  }
  .chip:hover { border-color:#ffd76b; }
  .chip.on { background:linear-gradient(135deg,#ffd76b,#ff9a5b); color:#3a2450; border-color:transparent; transform:translateY(-2px); }

  .teamnames { display:grid; gap:10px; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); }
  .teamrow { display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.05); padding:8px 10px; border-radius:14px; }
  .teamrow .dot { width:26px; height:26px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center; font-size:15px; }
  .teamrow input {
    flex:1; min-width:0; background:transparent; border:none; border-bottom:2px solid rgba(255,255,255,.25);
    color:#fff; font-size:16px; padding:6px 2px; font-family:'Noto Sans KR',sans-serif; font-weight:700;
  }
  .teamrow input:focus { outline:none; border-color:#ffd76b; }

  .bigbtn {
    display:block; width:100%; margin-top:8px; border:none; cursor:pointer;
    font-family:'Black Han Sans',sans-serif; font-size:22px; letter-spacing:1px;
    padding:16px; border-radius:16px; color:#3a2450;
    background:linear-gradient(135deg,#ffe08a,#ff9a5b);
    box-shadow:0 10px 26px rgba(255,154,91,.4); transition:.15s;
  }
  .bigbtn:hover { transform:translateY(-2px); box-shadow:0 14px 32px rgba(255,154,91,.55); }

  .legend { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px; margin-top:16px; }
  .legend .li { display:flex; align-items:center; gap:8px; font-size:13px; color:#dcd4f5; }
  .legend .sw { width:16px; height:16px; border-radius:5px; flex:0 0 auto; }

  /* ============ 게임 화면 ============ */
  .game { display:none; margin-top:20px; }
  .game.show { display:block; }

  .layout { display:grid; grid-template-columns: minmax(0,1.15fr) minmax(280px,.85fr); gap:20px; align-items:start; }
  @media (max-width: 860px){ .layout { grid-template-columns:1fr; } }

  /* 보드 */
  .board {
    aspect-ratio:1/1; width:100%;
    display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:repeat(7,1fr);
    gap:5px; padding:10px; border-radius:20px;
    background:linear-gradient(135deg,#2c2150,#1c1436);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 20px 50px rgba(0,0,0,.4);
  }
  .tile {
    position:relative; border-radius:9px; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:2px; font-weight:800; color:#fff;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);
    min-width:0;
  }
  .tile .ic { font-size:clamp(13px,2.4vw,22px); line-height:1; }
  .tile .lb { font-size:clamp(7px,1.4vw,11px); font-weight:700; margin-top:2px; opacity:.95; line-height:1.05; word-break:keep-all; }
  .tile.cat { box-shadow: inset 0 -4px 0 rgba(0,0,0,.18); }
  .tile.active { animation:pulse 1s infinite; outline:3px solid #ffd76b; outline-offset:-3px; z-index:3; }
  @keyframes pulse { 0%,100%{ box-shadow:0 0 0 0 rgba(255,215,107,.6);} 50%{ box-shadow:0 0 14px 4px rgba(255,215,107,.7);} }

  .tile.special { background:linear-gradient(135deg,#3a2f63,#241b45); }
  .tile.start { background:linear-gradient(135deg,#ffd76b,#ff9a5b); color:#3a2450; }

  .tokens { position:absolute; top:2px; right:2px; display:flex; flex-wrap:wrap; gap:1px; justify-content:flex-end; max-width:70%; }
  .token { width:15px; height:15px; border-radius:50%; display:grid; place-items:center; font-size:10px; border:2px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.5); }

  .center {
    grid-column:2/7; grid-row:2/7;
    background:radial-gradient(circle at 50% 30%, rgba(255,255,255,.08), rgba(0,0,0,.15));
    border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:8px; text-align:center; border:1px dashed rgba(255,255,255,.15);
  }
  .center .logo { font-family:'Black Han Sans',sans-serif; font-size:clamp(16px,3.5vw,30px); line-height:1.1;
    background:linear-gradient(90deg,#ffd76b,#ff6fb0); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .center .note { font-size:clamp(9px,1.8vw,13px); color:#c7bdec; margin-top:6px; }
  .die {
    margin-top:10px; width:clamp(48px,9vw,74px); height:clamp(48px,9vw,74px); border-radius:16px;
    background:#fff; color:#241b45; display:grid; place-items:center;
    font-size:clamp(28px,6vw,46px); box-shadow:0 8px 20px rgba(0,0,0,.4); font-weight:900;
  }
  .die.roll { animation:shake .5s; }
  @keyframes shake { 0%,100%{transform:rotate(0) scale(1);} 25%{transform:rotate(-16deg) scale(1.08);} 75%{transform:rotate(16deg) scale(1.08);} }

  /* 사이드 패널 */
  .panel { display:flex; flex-direction:column; gap:14px; }
  .turnbar {
    border-radius:16px; padding:14px 16px; text-align:center; font-weight:800;
    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.12);
  }
  .turnbar .who { font-family:'Jua',sans-serif; font-size:22px; }
  .turnbar .hint { font-size:13px; color:#c7bdec; margin-top:4px; }

  .rollbtn {
    border:none; cursor:pointer; font-family:'Black Han Sans',sans-serif; font-size:22px; letter-spacing:1px;
    padding:16px; border-radius:16px; color:#3a2450;
    background:linear-gradient(135deg,#ffe08a,#ffb15b); box-shadow:0 10px 26px rgba(255,177,91,.4); transition:.12s;
  }
  .rollbtn:hover:not(:disabled){ transform:translateY(-2px); }
  .rollbtn:disabled { opacity:.5; cursor:not-allowed; }

  .scoreboard { display:flex; flex-direction:column; gap:8px; }
  .scorerow {
    display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:12px;
    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); transition:.15s;
  }
  .scorerow.cur { border-color:#ffd76b; background:rgba(255,215,107,.12); }
  .scorerow .dot { width:24px; height:24px; border-radius:50%; display:grid; place-items:center; font-size:14px; flex:0 0 auto; }
  .scorerow .nm { flex:1; font-weight:700; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .scorerow .st { font-family:'Jua',sans-serif; font-size:17px; color:#ffe08a; white-space:nowrap; }

  .miniinfo { font-size:12px; color:#a99fce; text-align:center; }
  .textbtn { background:none; border:none; color:#c7bdec; text-decoration:underline; cursor:pointer; font-size:13px; }

  /* ============ 문제 모달 ============ */
  .overlay {
    position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center;
    background:rgba(10,6,22,.72); backdrop-filter:blur(4px); padding:16px;
  }
  .overlay.show { display:flex; }
  .modal {
    width:100%; max-width:560px; background:linear-gradient(160deg,#2e2456,#1d1540);
    border:1px solid rgba(255,255,255,.14); border-radius:22px; padding:24px 22px;
    box-shadow:0 30px 70px rgba(0,0,0,.55); animation:pop .25s ease;
  }
  @keyframes pop { from{ transform:scale(.9); opacity:0;} to{ transform:scale(1); opacity:1;} }
  .modal .badge {
    display:inline-block; padding:6px 14px; border-radius:999px; font-weight:800; font-size:14px;
    margin-bottom:14px; font-family:'Jua',sans-serif;
  }
  .modal .q { font-size:clamp(17px,3vw,21px); font-weight:800; line-height:1.45; margin-bottom:18px; word-break:keep-all; }
  .choices { display:flex; flex-direction:column; gap:10px; }
  .choice {
    text-align:left; border:2px solid rgba(255,255,255,.16); background:rgba(255,255,255,.05); color:#fff;
    padding:13px 15px; border-radius:13px; font-size:16px; font-weight:600; cursor:pointer; transition:.12s;
    display:flex; gap:10px; align-items:flex-start; word-break:keep-all;
  }
  .choice:hover:not(:disabled){ border-color:#ffd76b; background:rgba(255,215,107,.1); }
  .choice:disabled { cursor:default; }
  .choice .key { font-family:'Jua',sans-serif; color:#ffd76b; flex:0 0 auto; }
  .choice.correct { border-color:#3ddc84; background:rgba(61,220,132,.18); }
  .choice.wrong { border-color:#ff6b6b; background:rgba(255,107,107,.16); }

  .explain { margin-top:16px; padding:14px 16px; border-radius:13px; background:rgba(255,255,255,.06);
    border-left:4px solid #ffd76b; font-size:15px; line-height:1.55; display:none; word-break:keep-all; }
  .explain.show { display:block; }
  .explain .res { font-family:'Jua',sans-serif; font-size:18px; margin-bottom:4px; }
  .nextbtn {
    display:none; width:100%; margin-top:16px; border:none; cursor:pointer;
    font-family:'Black Han Sans',sans-serif; font-size:19px; padding:13px; border-radius:14px; color:#3a2450;
    background:linear-gradient(135deg,#ffe08a,#ffb15b);
  }
  .nextbtn.show { display:block; }

  /* 승리 모달 */
  .win { text-align:center; }
  .win .trophy { font-size:64px; }
  .win h2 { font-family:'Black Han Sans',sans-serif; font-size:30px; margin:8px 0; color:#ffe08a; }
  .win .rank { text-align:left; margin:16px 0; display:flex; flex-direction:column; gap:8px; }

  /* 색종이 */
  .confetti { position:fixed; top:-12px; width:10px; height:16px; z-index:60; pointer-events:none; border-radius:2px; }

  footer { text-align:center; margin-top:26px; color:#8f85b5; font-size:12px; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🎵 6학년 음악 블루마블 🎲</h1>
  <p class="subtitle">1학기 총정리 · 모둠 대항 퀴즈 보드게임 (동아 · 최미영)</p>

  <!-- ===== 설정 ===== -->
  <div class="card setup" id="setup">
    <div class="field">
      <label>① 몇 모둠이 함께 하나요?</label>
      <div class="chips" id="teamCount">
        <button class="chip" data-n="1">혼자 (1)</button>
        <button class="chip on" data-n="2">2모둠</button>
        <button class="chip" data-n="3">3모둠</button>
        <button class="chip" data-n="4">4모둠</button>
      </div>
    </div>

    <div class="field">
      <label>② 모둠 이름 (그대로 두어도 돼요)</label>
      <div class="teamnames" id="teamNames"></div>
    </div>

    <div class="field">
      <label>③ 몇 개의 별⭐을 먼저 모으면 이길까요?</label>
      <div class="chips" id="goal">
        <button class="chip" data-g="6">별 6개 (짧게)</button>
        <button class="chip on" data-g="10">별 10개 (보통)</button>
        <button class="chip" data-g="15">별 15개 (길게)</button>
      </div>
    </div>

    <button class="bigbtn" id="startBtn">게임 시작하기 ▶</button>

    <div class="legend" id="legend"></div>
  </div>

  <!-- ===== 게임 ===== -->
  <div class="game" id="gameView">
    <div class="layout">
      <div class="board" id="board"></div>
      <div class="panel">
        <div class="turnbar" id="turnbar">
          <div class="who" id="whoTurn">–</div>
          <div class="hint" id="turnHint">주사위를 굴려 출발!</div>
        </div>
        <button class="rollbtn" id="rollBtn">🎲 주사위 굴리기</button>
        <div class="scoreboard" id="scoreboard"></div>
        <div class="miniinfo" id="miniInfo"></div>
        <div style="text-align:center"><button class="textbtn" id="resetBtn">처음부터 다시</button></div>
      </div>
    </div>
    <footer>
      각 칸에 도착하면 그 단원의 문제가 나와요. 정답을 맞히면 별⭐ 획득!<br>
      🔑 황금열쇠 = 보너스 문제(별 2개) · 🎼 지휘자 무대 = 한 번 더 · 🏝️ 쉼표 섬 = 한 번 쉬기 · 🚩 출발 통과 = 별 1개
    </footer>
  </div>
</div>

<!-- 문제 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <span class="badge" id="qBadge">단원</span>
    <div class="q" id="qText">문제</div>
    <div class="choices" id="qChoices"></div>
    <div class="explain" id="qExplain"></div>
    <button class="nextbtn" id="qNext">확인하고 계속 ▶</button>
  </div>
</div>

<!-- 승리 모달 -->
<div class="overlay" id="winOverlay">
  <div class="modal win">
    <div class="trophy">🏆</div>
    <h2 id="winName">우승!</h2>
    <div class="rank" id="winRank"></div>
    <button class="nextbtn show" id="winAgain" style="display:block">다시 하기 🔁</button>
  </div>
</div>

<script>
// ====== 문제 데이터 (블루마블 6학년 음악 1학기 · 6×12=72문항) ======
const SUBJECTS = {
  id: "music6-1",
  name: "6학년 음악 (1학기)",
  units: [
    { id:1, name:"국악 장단과 민요", short:"장단·민요", color:"var(--c1)", ic:"🥁", questions:[
      { q:"'경복궁타령'에 쓰이는 장단은?", choices:["자진타령장단","굿거리장단","세마치장단","중중모리장단"], answer:0, exp:"경복궁타령은 자진타령장단에 맞추어 부릅니다." },
      { q:"'경복궁타령'은 어느 지역의 민요일까요?", choices:["경기 지역","남도(전라) 지역","제주 지역","서도(평안) 지역"], answer:0, exp:"경복궁타령은 경기 민요입니다." },
      { q:"'도움소 소리'에 쓰이는 장단은?", choices:["중중모리장단","자진모리장단","휘모리장단","진양조장단"], answer:0, exp:"도움소 소리는 중중모리장단으로 부릅니다." },
      { q:"한 사람이 앞부분을 부르면 여러 사람이 뒷부분을 이어 부르는 형식은?", choices:["메기고 받는 형식","돌림노래 형식","파트너 노래 형식","합창 형식"], answer:0, exp:"'도움소 소리'처럼 메기는소리와 받는소리로 주고받는 형식입니다." },
      { q:"'도움소 소리'의 바탕이 되는 토리는?", choices:["메나리토리","육자배기토리","경토리","수심가토리"], answer:0, exp:"도움소 소리는 메나리토리로 되어 있습니다." },
      { q:"'너영나영'은 어느 지역의 민요일까요?", choices:["제주 지역","경기 지역","남도(전라) 지역","강원 지역"], answer:0, exp:"너영나영은 제주 민요입니다." },
      { q:"전라도(남도) 지역 민요의 특징적인 토리는?", choices:["육자배기토리","메나리토리","경토리","수심가토리"], answer:0, exp:"남도 민요는 육자배기토리가 특징입니다." },
      { q:"육자배기토리의 특징으로 알맞은 것은?", choices:["굵게 떠는 소리와 꺾는 소리","맑고 경쾌한 소리","콧소리를 섞은 소리","빠르고 높은 소리"], answer:0, exp:"육자배기토리는 굵게 떠는 소리와 꺾는 소리가 특징입니다." },
      { q:"국악에서 가락을 꾸며 주는 표현 방법을 무엇이라고 할까요?", choices:["시김새","토리","장단","한배"], answer:0, exp:"시김새는 가락을 꾸며 자연스럽고 멋있게 만들어 줍니다." },
      { q:"강원도·경상도 지역 민요에 나타나는 토리는?", choices:["메나리토리","육자배기토리","경토리","제주토리"], answer:0, exp:"동부 지역(강원·경상) 민요는 메나리토리가 특징입니다." },
      { q:"메기고 받는 형식에서 여러 사람이 함께 부르는 부분은?", choices:["받는소리","메기는소리","후렴소리","이음소리"], answer:0, exp:"한 사람이 메기는소리를, 여러 사람이 받는소리를 부릅니다." },
      { q:"민요에 대한 설명으로 알맞은 것은?", choices:["백성들 사이에서 자연스럽게 전해 내려온 노래","궁중에서만 부르던 노래","한 사람의 작곡가가 만든 노래","서양에서 들어온 노래"], answer:0, exp:"민요는 지역마다 백성들의 삶 속에서 만들어져 전해 내려온 노래입니다." }

      { q:"저작권이란 무엇일까요?", choices:["창작한 사람이 자신의 작품에 대해 갖는 권리","음악을 크게 들을 수 있는 권리","악기를 살 수 있는 권리","공연장에 들어갈 권리"], answer:0, exp:"음악, 글, 그림 등을 만든 사람이 갖는 권리입니다." },
      { q:"저작권을 보호하는 바른 실천 방법은?", choices:["정당한 방법(합법 음원)으로 음악 듣기","무료 사이트에서 몰래 내려받기","친구 것을 복사해서 나누기","출처 없이 마음대로 올리기"], answer:0, exp:"합법적인 방법으로 음악을 이용하는 것이 저작권 보호입니다." },
      { q:"디지털 공간에서 음악을 감상할 때의 바른 태도는?", choices:["바르고 고운 말로 댓글 쓰기","기분 나쁘면 악플 달기","다른 사람 영상 무단 복제하기","아무 말이나 올리기"], answer:0, exp:"디지털 공간에서도 바르게 의사소통해야 합니다." },
      { q:"생활 속 음악의 예로 알맞지 않은 것은?", choices:["음악은 공연장에서만 들을 수 있다","운동 경기의 응원가","광고에 나오는 음악","영화의 배경 음악"], answer:0, exp:"음악은 공연장뿐 아니라 생활 곳곳에서 쓰입니다." },
      { q:"영화 속 음악의 중요한 역할은?", choices:["장면의 분위기와 감정을 전달한다","영화를 길게 만든다","배우의 대사를 가린다","화면을 밝게 한다"], answer:0, exp:"영화 음악은 장면의 분위기와 인물의 감정을 살려 줍니다." },
      { q:"친구에게 음악을 추천할 때 고려할 점으로 알맞은 것은?", choices:["친구의 취향과 상황","노래의 가격","가수의 키","앨범의 두께"], answer:0, exp:"친구가 좋아할 만한 음악을 상황에 맞게 추천합니다." },
      { q:"창작 국악곡 '아침 해'를 듣고 한 활동으로 알맞은 것은?", choices:["곡의 느낌을 이야기하기","가사를 영어로 번역하기","악기를 분해하기","지휘자 되어 보기"], answer:0, exp:"창작 국악곡을 듣고 느낌을 이야기하며 감상했습니다." }
    ]}
  ]
};

// ====== 유틸 ======
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
const UNITS = SUBJECTS.units;
const TEAM_STYLE = [
  { ic:"🎹", bg:"#e5484d" },
  { ic:"🎸", bg:"#3e7bfa" },
  { ic:"🥁", bg:"#30a46c" },
  { ic:"🎤", bg:"#f76b15" }
];
const DEFAULT_NAMES = ["1모둠","2모둠","3모둠","4모둠"];
const DIE_FACE = ["","⚀","⚁","⚂","⚃","⚄","⚅"];

// ====== 보드 구성 (24칸) ======
// 특수칸: 0=출발, 6=황금열쇠, 12=지휘자무대(한번더), 18=쉼표섬(한번쉬기)
const SPECIAL = {
  0:  { type:"start",  ic:"🚩", lb:"출발" },
  6:  { type:"key",    ic:"🔑", lb:"황금열쇠" },
  12: { type:"again",  ic:"🎼", lb:"지휘자무대" },
  18: { type:"island", ic:"🏝️", lb:"쉼표 섬" }
};
function buildTiles(){
  const tiles=[]; let catCursor=0;
  for(let i=0;i<24;i++){
    if(SPECIAL[i]){ tiles.push({idx:i, ...SPECIAL[i], special:true}); }
    else {
      const u = UNITS[catCursor % UNITS.length]; catCursor++;
      tiles.push({idx:i, type:"cat", unit:u, ic:u.ic, lb:u.short, color:u.color, special:false});
    }
  }
  return tiles;
}
function gridPos(i){
  if(i<=6) return {r:1, c:i+1};
  if(i<=12) return {r:i-5, c:7};
  if(i<=18) return {r:7, c:7-(i-12)};
  return {r:7-(i-18), c:1};
}

// ====== 상태 ======
let state = null;
let TILES = buildTiles();

// ====== 설정 화면 ======
let selTeams = 2, selGoal = 10;
const teamCountEl = document.getElementById('teamCount');
const teamNamesEl = document.getElementById('teamNames');
const goalEl = document.getElementById('goal');

function renderTeamInputs(){
  teamNamesEl.innerHTML = '';
  for(let i=0;i<selTeams;i++){
    const s = TEAM_STYLE[i];
    const row = document.createElement('div'); row.className='teamrow';
    row.innerHTML = `<span class="dot" style="background:${s.bg}">${s.ic}</span>
      <input type="text" maxlength="10" value="${DEFAULT_NAMES[i]}" data-i="${i}">`;
    teamNamesEl.appendChild(row);
  }
}
teamCountEl.addEventListener('click', e=>{
  const b=e.target.closest('.chip'); if(!b) return;
  [...teamCountEl.children].forEach(c=>c.classList.remove('on')); b.classList.add('on');
  selTeams = +b.dataset.n; renderTeamInputs();
});
goalEl.addEventListener('click', e=>{
  const b=e.target.closest('.chip'); if(!b) return;
  [...goalEl.children].forEach(c=>c.classList.remove('on')); b.classList.add('on');
  selGoal = +b.dataset.g;
});
// 범례
document.getElementById('legend').innerHTML = UNITS.map(u=>
  `<div class="li"><span class="sw" style="background:${u.color}"></span>${u.ic} ${u.name}</div>`
).join('');
renderTeamInputs();

// ====== 게임 시작 ======
document.getElementById('startBtn').addEventListener('click', ()=>{
  const inputs=[...teamNamesEl.querySelectorAll('input')];
  const players = inputs.map((inp,i)=>({
    name: inp.value.trim() || DEFAULT_NAMES[i],
    ic: TEAM_STYLE[i].ic, bg: TEAM_STYLE[i].bg,
    stars:0, pos:0, skip:false
  }));
  state = { players, cur:0, goal:selGoal, rolling:false, questionOpen:false, lastQ:{} };
  document.getElementById('setup').style.display='none';
  document.getElementById('gameView').classList.add('show');
  renderBoard();
  updatePanel();
  window.scrollTo({top:0, behavior:'smooth'});
});

// ====== 보드 렌더 ======
function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML='';
  TILES.forEach(t=>{
    const el=document.createElement('div');
    const {r,c}=gridPos(t.idx);
    el.style.gridRow=r; el.style.gridColumn=c;
    el.dataset.idx=t.idx;
    el.className='tile '+(t.type==='cat'?'cat':'special')+(t.type==='start'?' start':'');
    if(t.type==='cat') el.style.background=t.color;
    el.innerHTML=`<span class="ic">${t.ic}</span><span class="lb">${t.lb}</span><span class="tokens"></span>`;
    board.appendChild(el);
  });
  // 중앙
  const center=document.createElement('div');
  center.className='center';
  center.innerHTML=`<div class="logo">음악<br>블루마블</div>
    <div class="note">주사위를 굴려<br>판을 돌아요!</div>
    <div class="die" id="die">🎲</div>`;
  board.appendChild(center);
  renderTokens();
}
function renderTokens(){
  document.querySelectorAll('.tokens').forEach(t=>t.innerHTML='');
  state.players.forEach(p=>{
    const tile=document.querySelector(`.tile[data-idx="${p.pos}"] .tokens`);
    if(tile){
      const tk=document.createElement('span');
      tk.className='token'; tk.style.background=p.bg; tk.textContent=p.ic;
      tile.appendChild(tk);
    }
  });
}

// ====== 패널 ======
function updatePanel(){
  const p=state.players[state.cur];
  document.getElementById('whoTurn').innerHTML=`${p.ic} ${p.name} 차례`;
  document.getElementById('turnHint').textContent = p.skip ? '이번엔 쉼표 섬에서 한 번 쉬어요!' : '주사위를 굴려 보세요';
  document.getElementById('miniInfo').textContent = `목표: 별 ${state.goal}개 먼저 모으기`;
  // 점수판
  const sb=document.getElementById('scoreboard');
  sb.innerHTML=state.players.map((pl,i)=>
    `<div class="scorerow ${i===state.cur?'cur':''}">
      <span class="dot" style="background:${pl.bg}">${pl.ic}</span>
      <span class="nm">${pl.name}</span>
      <span class="st">⭐ ${pl.stars}</span>
    </div>`).join('');
  const rb=document.getElementById('rollBtn');
  rb.disabled=false;
  rb.textContent = p.skip ? '⏭️ 한 번 쉬기 (넘어가기)' : '🎲 주사위 굴리기';
}

// ====== 주사위 & 이동 ======
document.getElementById('rollBtn').addEventListener('click', ()=>{
  if(state.rolling || state.questionOpen) return;
  const p=state.players[state.cur];
  if(p.skip){ p.skip=false; nextTurn(); return; }
  state.rolling=true;
  const rb=document.getElementById('rollBtn'); rb.disabled=true;
  const die=document.getElementById('die'); die.classList.add('roll');
  let ticks=0;
  const spin=setInterval(()=>{ die.textContent=DIE_FACE[1+Math.floor(Math.random()*6)]; ticks++;
    if(ticks>8){ clearInterval(spin); finishRoll(); }
  },70);
  function finishRoll(){
    const roll=1+Math.floor(Math.random()*6);
    die.textContent=DIE_FACE[roll];
    setTimeout(()=>die.classList.remove('roll'),200);
    document.getElementById('turnHint').textContent=`🎲 ${roll} 나왔어요! 이동합니다`;
    moveToken(p, roll);
  }
});

function moveToken(p, roll){
  let steps=roll;
  const step=()=>{
    p.pos=(p.pos+1)%24;
    if(p.pos===0){ p.stars++; flash('🚩 출발 통과! 별 +1'); }
    renderTokens();
    highlight(p.pos);
    steps--;
    if(steps>0){ setTimeout(step, 230); }
    else { setTimeout(()=>{ landOn(p); }, 320); }
  };
  step();
}
function highlight(idx){
  document.querySelectorAll('.tile.active').forEach(e=>e.classList.remove('active'));
  const el=document.querySelector(`.tile[data-idx="${idx}"]`);
  if(el) el.classList.add('active');
}

// ====== 칸 도착 처리 ======
function landOn(p){
  const t=TILES[p.pos];
  if(t.type==='cat'){ openQuestion(t.unit, 1); }
  else if(t.type==='key'){ const u=UNITS[Math.floor(Math.random()*UNITS.length)]; flash('🔑 황금열쇠! 보너스 문제 (별 2개)'); setTimeout(()=>openQuestion(u,2,true),700); }
  else if(t.type==='again'){ flash('🎼 지휘자 무대! 한 번 더 굴려요'); endTurn(true); }
  else if(t.type==='island'){ p.skip=true; flash('🏝️ 쉼표 섬! 다음 차례는 쉬어요'); endTurn(false); }
  else if(t.type==='start'){ p.stars++; flash('🚩 출발 도착! 별 +1'); endTurn(false); }
}

// ====== 문제 모달 ======
const overlay=document.getElementById('overlay');
function openQuestion(unit, reward, bonus){
  state.questionOpen=true;
  // 최근 낸 문제 피하기
  const used = state.lastQ[unit.id] || [];
  let pool = unit.questions.map((q,i)=>i).filter(i=>!used.includes(i));
  if(pool.length===0){ pool=unit.questions.map((q,i)=>i); state.lastQ[unit.id]=[]; }
  const qi=pool[Math.floor(Math.random()*pool.length)];
  (state.lastQ[unit.id]=state.lastQ[unit.id]||[]).push(qi);
  if(state.lastQ[unit.id].length>6) state.lastQ[unit.id].shift();
  const Q=unit.questions[qi];

  const badge=document.getElementById('qBadge');
  badge.textContent=(bonus?'🔑 보너스 · ':'')+unit.ic+' '+unit.name+(reward>1?` (별 ${reward}개)`:'');
  badge.style.background=unit.color;
  document.getElementById('qText').textContent=Q.q;

  // 보기 셔플 (원본 answer는 항상 0 → 반드시 섞기)
  const opts=shuffle(Q.choices.map((c,i)=>({text:c, correct:i===Q.answer})));
  const KEYS=['㉮','㉯','㉰','㉱'];
  const box=document.getElementById('qChoices'); box.innerHTML='';
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='choice';
    b.innerHTML=`<span class="key">${KEYS[i]}</span><span>${o.text}</span>`;
    b.addEventListener('click', ()=>answer(b, o.correct, opts, Q, unit, reward));
    box.appendChild(b);
  });
  const ex=document.getElementById('qExplain'); ex.className='explain'; ex.innerHTML='';
  const nx=document.getElementById('qNext'); nx.className='nextbtn';
  overlay.classList.add('show');
}
function answer(btn, correct, opts, Q, unit, reward){
  const buttons=[...document.querySelectorAll('#qChoices .choice')];
  buttons.forEach((b,i)=>{ b.disabled=true; if(opts[i].correct) b.classList.add('correct'); });
  const p=state.players[state.cur];
  const ex=document.getElementById('qExplain');
  if(correct){
    p.stars+=reward;
    ex.innerHTML=`<div class="res" style="color:#3ddc84">⭕ 정답! ⭐ +${reward}</div>${Q.exp}`;
  } else {
    btn.classList.add('wrong');
    ex.innerHTML=`<div class="res" style="color:#ff8b8b">❌ 아쉬워요</div>${Q.exp}`;
  }
  ex.classList.add('show');
  const nx=document.getElementById('qNext'); nx.classList.add('show');
  nx.onclick=()=>{
    overlay.classList.remove('show');
    state.questionOpen=false;
    if(correct) burst();
    endTurn(false);
  };
}

// ====== 턴 종료 ======
function endTurn(again){
  updatePanel();
  if(checkWin()) return;
  if(again){ state.rolling=false; document.getElementById('rollBtn').disabled=false; return; }
  nextTurn();
}
function nextTurn(){
  document.querySelectorAll('.tile.active').forEach(e=>e.classList.remove('active'));
  state.cur=(state.cur+1)%state.players.length;
  state.rolling=false;
  updatePanel();
}

// ====== 승리 ======
function checkWin(){
  const winner=state.players.find(p=>p.stars>=state.goal);
  if(!winner) return false;
  showWin();
  return true;
}
function showWin(){
  const ranked=[...state.players].sort((a,b)=>b.stars-a.stars);
  document.getElementById('winName').textContent=`${ranked[0].ic} ${ranked[0].name} 우승!`;
  const medals=['🥇','🥈','🥉','🏅'];
  document.getElementById('winRank').innerHTML=ranked.map((p,i)=>
    `<div class="scorerow"><span class="dot" style="background:${p.bg}">${p.ic}</span>
      <span class="nm">${medals[i]||''} ${p.name}</span><span class="st">⭐ ${p.stars}</span></div>`).join('');
  document.getElementById('winOverlay').classList.add('show');
  bigBurst();
}
document.getElementById('winAgain').addEventListener('click', ()=>location.reload());
document.getElementById('resetBtn').addEventListener('click', ()=>{ if(confirm('처음 설정 화면으로 돌아갈까요?')) location.reload(); });

// ====== 알림/색종이 ======
let flashTimer=null;
function flash(msg){
  document.getElementById('turnHint').textContent=msg;
}
function burst(){ spawnConfetti(24); }
function bigBurst(){ spawnConfetti(90); }
function spawnConfetti(n){
  const colors=['#ffd76b','#ff6fb0','#3ddc84','#3e7bfa','#ff9a5b','#8e4ec6'];
  for(let i=0;i<n;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dur=1400+Math.random()*1200;
    c.animate([
      {transform:`translateY(0) rotate(0)`, opacity:1},
      {transform:`translateY(${window.innerHeight+40}px) rotate(${540+Math.random()*360}deg)`, opacity:.9}
    ], {duration:dur, easing:'cubic-bezier(.3,.6,.5,1)'});
    setTimeout(()=>c.remove(), dur);
  }
}
</script>
